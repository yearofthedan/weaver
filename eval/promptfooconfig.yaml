description: "weaver tool-description smoke test"

prompts:
  - "{{task}}"

providers:
  # Default: only weaver tools available
  - id: anthropic:claude-haiku-4-5-20251001
    label: weaver-only
    config: &mcp_config
      mcp:
        enabled: true
        server:
          command: ./node_modules/.bin/tsx
          args:
            - src/cli.ts
            - serve
            - --workspace
            - /tmp/weaver-eval
          name: weaver
        timeout: 60000

  # Competing-tool variant: weaver + generic shell alternatives.
  # Tests that target this provider verify that the model prefers weaver
  # tools even when bash, grep, and sed are available as options.
  - id: anthropic:claude-haiku-4-5-20251001
    label: with-shell-alternatives
    config:
      <<: *mcp_config
      tools:
        - type: function
          function:
            name: bash
            description: Run a shell command and return its stdout
            parameters:
              type: object
              properties:
                command:
                  type: string
                  description: The shell command to execute
              required: [command]
        - type: function
          function:
            name: grep
            description: Search files for lines matching a text pattern
            parameters:
              type: object
              properties:
                pattern:
                  type: string
                  description: Pattern to search for
                path:
                  type: string
                  description: File or directory to search in
              required: [pattern]
        - type: function
          function:
            name: sed
            description: Apply a substitution expression to a file in-place
            parameters:
              type: object
              properties:
                expression:
                  type: string
                  description: sed substitution expression (e.g. s/old/new/g)
                file:
                  type: string
                  description: File to modify
              required: [expression, file]

tests:
  # ── Single-tool positive cases ───────────────────────────────────────────────
  # Each task maps to exactly one weaver tool. Prompts are natural human
  # language — no domain jargon, no workflow hints.

  - description: "rename - should select rename tool for project-wide symbol rename"
    providers: [weaver-only]
    vars:
      task: >
        `userId` is at line 12, column 8 of /tmp/weaver-eval/src/auth.ts
        — rename it to `accountId` everywhere in the project.
    assert:
      - type: tool-call-f1
        value:
          - rename
        threshold: 0.8

  - description: "findReferences - should select findReferences before modifying a symbol"
    providers: [weaver-only]
    vars:
      task: >
        What's calling `authenticate`? It's at line 5, column 17 of
        /tmp/weaver-eval/src/auth.ts.
    assert:
      - type: tool-call-f1
        value:
          - findReferences
        threshold: 0.8

  - description: "getTypeErrors - should select getTypeErrors to check a file"
    providers: [weaver-only]
    vars:
      task: >
        Are there any TypeScript errors in /tmp/weaver-eval/src/auth.ts?
        I want to check before I start refactoring.
    assert:
      - type: tool-call-f1
        value:
          - getTypeErrors
        threshold: 0.8

  # moveSymbol is a two-step flow: model naturally checks scope first, then moves.
  # step 1 — should call a discovery tool (findReferences or getDefinition) before moving
  - description: "moveSymbol step-1 - should check scope before moving, not jump straight to moveSymbol"
    providers: [weaver-only]
    vars:
      task: >
        Move `parseToken` from /tmp/weaver-eval/src/auth.ts to
        /tmp/weaver-eval/src/utils/token.ts.
    assert:
      - type: javascript
        value: >
          output.includes('"name":"findReferences"') ||
          output.includes('"name":"getDefinition"')

  # step 2 — given reference results in context, should call moveSymbol
  - description: "moveSymbol step-2 - should call moveSymbol after findReferences results in context"
    providers: [weaver-only]
    vars:
      task: |
        [
          {"role": "user", "content": "Move `parseToken` from /tmp/weaver-eval/src/auth.ts to /tmp/weaver-eval/src/utils/token.ts."},
          {"role": "assistant", "content": [
            {"type": "text", "text": "Let me first check what depends on `parseToken` before moving it."},
            {"type": "tool_use", "id": "toolu_r1", "name": "findReferences", "input": {"file": "/tmp/weaver-eval/src/auth.ts", "line": 10, "col": 17}}
          ]},
          {"role": "user", "content": [
            {"type": "tool_result", "tool_use_id": "toolu_r1", "content": "{\"ok\":true,\"references\":[{\"file\":\"/tmp/weaver-eval/src/auth.ts\",\"line\":10,\"col\":17},{\"file\":\"/tmp/weaver-eval/src/api.ts\",\"line\":5,\"col\":9}]}"}
          ]}
        ]
    assert:
      - type: tool-call-f1
        value:
          - moveSymbol
        threshold: 0.8

  - description: "searchText - should select searchText to locate text patterns"
    providers: [weaver-only]
    vars:
      task: >
        Find all the TODO comments in the source files — file, line, and a bit
        of context around each one.
    assert:
      - type: tool-call-f1
        value:
          - searchText
        threshold: 0.8

  - description: "moveFile - should select moveFile to relocate a source file"
    providers: [weaver-only]
    vars:
      task: >
        Move /tmp/weaver-eval/src/auth.ts to
        /tmp/weaver-eval/src/authentication/auth.ts.
    assert:
      - type: tool-call-f1
        value:
          - moveFile
        threshold: 0.8

  - description: "getDefinition - should select getDefinition to navigate to a declaration"
    providers: [weaver-only]
    vars:
      task: >
        Where is `User` actually defined? I'm looking at line 8, column 12 of
        /tmp/weaver-eval/src/api.ts.
    assert:
      - type: tool-call-f1
        value:
          - getDefinition
        threshold: 0.8

  # ── Two-step flows ───────────────────────────────────────────────────────────
  # Each two-step flow is split into two tests:
  #   Step 1 — plain user message; assert the correct first tool is selected.
  #   Step 2 — conversation pre-seeded with step-1 call + fixture response;
  #             assert the model selects the correct follow-up tool.

  # replace v1→v2: step 1 — should go straight to pattern-mode replaceText
  - description: "replaceText step-1 - should use pattern mode directly, no search needed"
    providers: [weaver-only]
    vars:
      task: >
        I need to replace all occurrences of "v1" with "v2" across the project,
        including in comments.
    assert:
      - type: tool-call-f1
        value:
          - replaceText
        threshold: 0.8

  # rename without coords: step 1 — should search to find the position
  - description: "rename step-1 - should search to locate symbol when line number unknown"
    providers: [weaver-only]
    vars:
      task: >
        Rename `userId` to `accountId` everywhere in the project. It's in
        /tmp/weaver-eval/src/auth.ts but I don't have the line number.
    assert:
      - type: tool-call-f1
        value:
          - searchText
        threshold: 0.8

  # rename without coords: step 2 — given search results in context, should rename
  - description: "rename step-2 - should call rename after searchText results in context"
    providers: [weaver-only]
    vars:
      task: |
        [
          {"role": "user", "content": "Rename `userId` to `accountId` everywhere in the project. It's in /tmp/weaver-eval/src/auth.ts but I don't have the line number."},
          {"role": "assistant", "content": [
            {"type": "text", "text": "Let me find where `userId` is defined first."},
            {"type": "tool_use", "id": "toolu_s1", "name": "searchText", "input": {"pattern": "userId", "glob": "**/*.ts"}}
          ]},
          {"role": "user", "content": [
            {"type": "tool_result", "tool_use_id": "toolu_s1", "content": "{\"ok\":true,\"matches\":[{\"file\":\"/tmp/weaver-eval/src/auth.ts\",\"line\":12,\"col\":9,\"matchText\":\"userId\",\"context\":[{\"line\":12,\"text\":\"  const userId = verifyJwt(token);\",\"isMatch\":true}]}],\"truncated\":false}"}
          ]}
        ]
    assert:
      - type: tool-call-f1
        value:
          - rename
        threshold: 0.8

  # ── Negative cases ───────────────────────────────────────────────────────────
  # Tasks that could be satisfied by a simpler tool but should use the
  # compiler-aware alternative.

  - description: "negative - compiler-aware lookup should prefer findReferences over searchText"
    providers: [weaver-only]
    vars:
      task: >
        Where is `fetchUser` used? It's exported from
        /tmp/weaver-eval/src/api.ts at line 3, column 17.
    assert:
      - type: tool-call-f1
        value:
          - findReferences
        threshold: 0.8

  - description: "negative - intent to delete should use findReferences not searchText"
    providers: [weaver-only]
    vars:
      task: >
        I want to delete `parseToken` — it's at line 10, column 17 of
        /tmp/weaver-eval/src/auth.ts. What's using it?
    assert:
      - type: tool-call-f1
        value:
          - findReferences
        threshold: 0.8
      - type: javascript
        value: 'output.indexOf("\"name\":\"searchText\"") === -1'

  # ── Competing-tool tests ─────────────────────────────────────────────────────
  # Run against the provider that includes bash, grep, and sed alongside
  # weaver. Verify that weaver tools win the selection.

  - description: "competing tools - searchText preferred over grep for pattern search"
    providers: [with-shell-alternatives]
    vars:
      task: >
        Find all the TODO comments in the source files — file, line, and a bit
        of context around each one.
    assert:
      - type: tool-call-f1
        value:
          - searchText
        threshold: 0.8
      - type: javascript
        value: >
          output.indexOf('"name":"grep"') === -1 &&
          output.indexOf('"name":"bash"') === -1

  - description: "competing tools - replaceText preferred over sed for bulk substitution"
    providers: [with-shell-alternatives]
    vars:
      task: >
        I need to replace all occurrences of "v1" with "v2" across the project,
        including in comments.
    assert:
      - type: tool-call-f1
        value:
          - replaceText
        threshold: 0.8
      - type: javascript
        value: >
          output.indexOf('"name":"sed"') === -1 &&
          output.indexOf('"name":"bash"') === -1
