name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check
