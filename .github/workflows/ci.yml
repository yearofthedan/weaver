name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check
