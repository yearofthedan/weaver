name: Quality Feedback

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run mutation tests
        id: mutate
        run: pnpm test:mutate
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: |
            reports/mutation/mutation.html
            reports/mutation/mutation.json

      - name: Post summary
        if: always()
        run: |
          if [ "${{ steps.mutate.outcome }}" == "success" ]; then
            echo "## Mutation score: above threshold" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Mutation score: below threshold ⚠️" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full report: download the \`mutation-report\` artifact." >> $GITHUB_STEP_SUMMARY

      # Triggered only when score drops below the break threshold (75).
      # Uses claude-opus-4-6 — classification and test-writing require strong code reasoning.
      # Required secrets: ANTHROPIC_API_KEY
      - name: Triage surviving mutants
        if: steps.mutate.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/mutate-triage"
          claude_args: >-
            --model claude-opus-4-6
            --max-turns 50
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
